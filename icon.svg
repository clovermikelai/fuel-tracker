<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <!-- 加油槍主體 -->
  <g transform="translate(140, 110)">
    <!-- 車體(油箱) -->
    <rect x="0" y="60" width="140" height="200" rx="16" fill="none" stroke="#38bdf8" stroke-width="14"/>
    <!-- 油箱口 -->
    <rect x="30" y="40" width="80" height="24" rx="6" fill="#38bdf8"/>
    <!-- 油位指示 -->
    <rect x="16" y="160" width="108" height="84" rx="6" fill="#22d3ee" opacity="0.85"/>
    <!-- 加油管 -->
    <path d="M 140 120 L 200 120 L 200 80 L 230 80"
          fill="none" stroke="#38bdf8" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 噴嘴 -->
    <rect x="225" y="65" width="30" height="30" rx="4" fill="#38bdf8"/>
  </g>
  <!-- 文字 -->
  <text x="256" y="440" font-family="-apple-system, Segoe UI, 'Microsoft JhengHei', sans-serif"
        font-size="64" font-weight="700" text-anchor="middle" fill="#e2e8f0" letter-spacing="4">油耗</text>
</svg>
